<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Hamburger</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a0a00;
      --accent: #ff6b1a;
      --text: #fff8f0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    body::before {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,26,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .sub {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,248,240,0.38);
      margin-bottom: 0.5rem;
      animation: fadeUp 0.8s 0.2s both;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      text-align: center;
      margin-bottom: 0.6rem;
      animation: fadeUp 0.8s 0.35s both;
    }

    h1 span { color: var(--accent); }

    #canvas-wrap {
      width: min(460px, 88vw);
      height: min(460px, 88vw);
      cursor: grab;
      animation: fadeUp 0.8s 0.55s both;
    }
    #canvas-wrap:active { cursor: grabbing; }
    canvas { display: block; border-radius: 20px; }

    .hint {
      margin-top: 0.6rem;
      font-size: 0.72rem;
      color: rgba(255,248,240,0.28);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: fadeUp 0.8s 0.75s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <p class="sub">— interaktivní 3D model —</p>
  <h1>Největší <span>Burger</span> v okolí</h1>
  <div id="canvas-wrap"></div>
  <p class="hint">☞ Táhni myší pro otočení &nbsp;·&nbsp; Kolečko = zoom</p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function () {
    const wrap = document.getElementById('canvas-wrap');
    const W = wrap.clientWidth, H = wrap.clientHeight;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(W, H);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    wrap.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 100);
    camera.position.set(0, 0.8, 5.5);

    // Lights
    scene.add(new THREE.AmbientLight(0xfff0e0, 0.7));
    const sun = new THREE.DirectionalLight(0xfff4cc, 2.0);
    sun.position.set(5, 10, 7); sun.castShadow = true;
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xff7733, 0.6);
    fill.position.set(-6, -3, -4);
    scene.add(fill);
    const rim = new THREE.PointLight(0xff5500, 1.4, 14);
    rim.position.set(3, 4, -4);
    scene.add(rim);

    const mat = (color, rough = 0.7, metal = 0) =>
      new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: metal });

    const burger = new THREE.Group();
    scene.add(burger);

    // ── Bottom bun ──
    const botBun = new THREE.Mesh(
      new THREE.CylinderGeometry(1.05, 1.12, 0.4, 40),
      mat(0xd4832a, 0.62)
    );
    botBun.castShadow = true;
    botBun.position.y = 0;
    burger.add(botBun);

    // ── Lettuce ──
    const lettuce = new THREE.Mesh(
      new THREE.CylinderGeometry(1.22, 1.22, 0.13, 40),
      mat(0x3d9e35, 0.88)
    );
    lettuce.position.y = 0.27;
    burger.add(lettuce);

    // Lettuce frilly edge (torus)
    const lettuceEdge = new THREE.Mesh(
      new THREE.TorusGeometry(1.22, 0.09, 6, 40),
      mat(0x4bb840, 0.9)
    );
    lettuceEdge.rotation.x = Math.PI / 2;
    lettuceEdge.position.y = 0.27;
    burger.add(lettuceEdge);

    // ── Tomato slices ──
    [0.44, 0.54].forEach(y => {
      const t = new THREE.Mesh(
        new THREE.CylinderGeometry(0.97, 0.97, 0.08, 40),
        mat(0xcc2211, 0.6)
      );
      t.position.y = y;
      burger.add(t);
    });

    // ── Onion ring ──
    const onion = new THREE.Mesh(
      new THREE.TorusGeometry(0.62, 0.1, 10, 40),
      mat(0xc888c0, 0.7)
    );
    onion.rotation.x = Math.PI / 2;
    onion.position.y = 0.67;
    burger.add(onion);

    // ── Patty ──
    const patty = new THREE.Mesh(
      new THREE.CylinderGeometry(1.02, 1.07, 0.3, 40),
      mat(0x3e1a0a, 0.88)
    );
    patty.position.y = 0.88;
    patty.castShadow = true;
    burger.add(patty);

    // ── Cheese (drooping square) ──
    const cheeseGeo = new THREE.BoxGeometry(2.2, 0.07, 2.2, 8, 1, 8);
    const chPos = cheeseGeo.attributes.position;
    for (let i = 0; i < chPos.count; i++) {
      const x = chPos.getX(i), z = chPos.getZ(i);
      chPos.setY(i, chPos.getY(i) - Math.sqrt(x*x + z*z) * 0.09);
    }
    chPos.needsUpdate = true;
    cheeseGeo.computeVertexNormals();
    const cheese = new THREE.Mesh(cheeseGeo, mat(0xffcc22, 0.5));
    cheese.position.y = 1.06;
    cheese.rotation.y = Math.PI / 4;
    burger.add(cheese);

    // ── Top bun dome ──
    const dome = new THREE.Mesh(
      new THREE.SphereGeometry(1.1, 40, 20, 0, Math.PI*2, 0, Math.PI/2),
      mat(0xc8742a, 0.6)
    );
    dome.position.y = 1.22;
    dome.castShadow = true;
    burger.add(dome);

    const bunBase = new THREE.Mesh(
      new THREE.CylinderGeometry(1.1, 1.1, 0.1, 40),
      mat(0xc8742a, 0.62)
    );
    bunBase.position.y = 1.22;
    burger.add(bunBase);

    // ── Sesame seeds ──
    const seedMat = mat(0xf5dfa0, 0.9);
    [
      [0, 0], [0.42, 0.28], [-0.38, 0.22], [0.16, -0.44],
      [-0.22, -0.38], [0.52, -0.12], [-0.48, -0.08], [0.08, 0.52],
      [0.3, -0.3], [-0.3, 0.38]
    ].forEach(([sx, sz]) => {
      const seed = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 5), seedMat);
      const r = Math.sqrt(sx*sx + sz*sz);
      const phi = r / 1.1;
      const theta = Math.atan2(sz, sx);
      seed.position.set(
        1.12 * Math.sin(phi) * Math.cos(theta),
        1.22 + 1.12 * Math.cos(phi),
        1.12 * Math.sin(phi) * Math.sin(theta)
      );
      burger.add(seed);
    });

    burger.position.y = -0.8;

    // ── Plate ──
    const plate = new THREE.Mesh(
      new THREE.CylinderGeometry(1.6, 1.6, 0.07, 48),
      mat(0xffe8cc, 0.35, 0.2)
    );
    plate.position.y = -0.85;
    plate.receiveShadow = true;
    scene.add(plate);

    // ── Interaction ──
    let isDragging = false, prevX = 0, prevY = 0;
    let rotY = 0, rotX = -0.12;
    let velY = 0.004, velX = 0;

    const el = renderer.domElement;

    el.addEventListener('mousedown', e => {
      isDragging = true; prevX = e.clientX; prevY = e.clientY;
      velY = 0; velX = 0;
    });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      velY = (e.clientX - prevX) * 0.013;
      velX = (e.clientY - prevY) * 0.013;
      prevX = e.clientX; prevY = e.clientY;
    });

    el.addEventListener('touchstart', e => {
      isDragging = true;
      prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
      velY = 0; velX = 0;
    });
    window.addEventListener('touchend', () => isDragging = false);
    window.addEventListener('touchmove', e => {
      if (!isDragging) return;
      velY = (e.touches[0].clientX - prevX) * 0.013;
      velX = (e.touches[0].clientY - prevY) * 0.013;
      prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
    });

    el.addEventListener('wheel', e => {
      camera.position.z = Math.max(2.8, Math.min(9.5, camera.position.z + e.deltaY * 0.01));
    });

    // ── Loop ──
    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.01;

      if (isDragging) {
        rotY += velY; rotX += velX;
        velY *= 0.85; velX *= 0.85;
      } else {
        velY += (0.004 - velY) * 0.05; // drift back to auto-spin
        velX *= 0.94;
        rotY += velY; rotX += velX;
      }
      rotX = Math.max(-1.0, Math.min(1.0, rotX));

      burger.rotation.y = rotY;
      burger.rotation.x = rotX;
      burger.position.y = -0.8 + Math.sin(t) * 0.055;
      plate.position.y  = -0.85 + Math.sin(t) * 0.055;

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      const w = wrap.clientWidth, h = wrap.clientHeight;
      camera.aspect = w / h; camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });
  })();
  </script>
</body>
</html>
